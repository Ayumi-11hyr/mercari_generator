<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>メルカリ出品文ジェネレーター（あんスタ）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.6;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    select, input, button, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 6px 8px;
      font-size: 0.95rem;
    }
    select[multiple] { height: 260px; }
    button { cursor: pointer; }
    .result-box {
      border: 1px solid #ccc;
      padding: 8px;
      border-radius: 4px;
      background: #fafafa;
      margin-top: 8px;
    }
    pre { white-space: pre-wrap; margin: 4px 0; }
  </style>
</head>
<body>

<h1>メルカリ出品文ジェネレーター（あんスタ）</h1>

<h2>① キャラクター / ユニット選択（複数可）</h2>
<select id="characters" multiple></select>

<h2>② グッズ選択（複数可）</h2>
<select id="goods" multiple></select>

<h2>③ 枚数・セット数</h2>
<input id="count" placeholder="10枚セット">

<h2>④ 商品名に入れる代表グッズ（任意）</h2>
<input id="main-good" placeholder="例：限定招募ポラロイド">

<hr>

<h2>⑤ 商品名テンプレート（自由編集）</h2>
<textarea id="template-title" rows="2">{NAME} {GOOD} {COUNT}</textarea>

<h2>⑥ 説明文テンプレート（自由編集）</h2>
<textarea id="template-description" rows="14">
★説明文をご覧いただき、質問なければ即購入いただいて問題ありません。

●商品概要
{NAME}　{COUNT}
　- {GOODS}

●梱包方法
以下で梱包し、封筒で郵送します。
　画像の状態→まとめてOPP袋→両面厚紙補強→水濡れ防止

●商品の状態
開封のみ、未使用品
※中国グッズはカードの性質により、少し反りが見られます。
※素人保管ですので、初期傷など気にされる場合は購入お控えください。

検索用
{SEARCH}
</textarea>

<button onclick="generate()">商品名・説明文を生成</button>

<h2>生成結果</h2>
<div class="result-box">
  <strong>【商品名】</strong>
  <pre id="result-title"></pre>

  <strong>【商品説明】</strong>
  <pre id="result-desc"></pre>
</div>

<h2>コピー用テキスト</h2>
<textarea id="copy-all" rows="14"></textarea>
<button onclick="copyAll()">すべてコピー</button>

<script src="script.js"></script>
</body>
</html>

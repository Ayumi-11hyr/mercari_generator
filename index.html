<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>メルカリ出品文ジェネレーター（あんスタ）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.6;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    select, input, button, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 12px;
      padding: 6px 8px;
      font-size: 0.95rem;
    }
    select[multiple] { height: 260px; }
    button { cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h1>メルカリ出品文ジェネレーター（あんスタ）</h1>

<h2>① キャラクター / ユニット選択（複数可）</h2>
<select id="characters" multiple></select>

<h2>② グッズ選択（複数可）</h2>
<select id="goods" multiple></select>

<!-- ▼ コレ缶を選んだときだけ表示される追加選択欄 -->
<div id="badge-options" class="hidden">
  <h2>コレ缶：年度</h2>
  <select id="badge-year">
    <option value="">選択してください</option>
    <option value="2024">2024</option>
    <option value="2025">2025</option>
    <option value="2026">2026</option>
  </select>

  <h2>コレ缶：月</h2>
  <select id="badge-month">
    <option value="">選択してください</option>
    <option value="Jan.">Jan.</option>
    <option value="Feb.">Feb.</option>
    <option value="Mar.">Mar.</option>
    <option value="Apr.">Apr.</option>
    <option value="May.">May.</option>
    <option value="Jun.">Jun.</option>
    <option value="Jul.">Jul.</option>
    <option value="Aug.">Aug.</option>
    <option value="Sep.">Sep.</option>
    <option value="Oct.">Oct.</option>
    <option value="Nov.">Nov.</option>
    <option value="Dec.">Dec.</option>
  </select>

  <h2>コレ缶：Side</h2>
  <select id="badge-side">
    <option value="">選択してください</option>
    <option value="Casual">Casual</option>
    <option value="Idol">Idol</option>
  </select>
</div>

<h2>③ 枚数・セット数</h2>
<input id="count" placeholder="10点">

<h2>④ 商品名に入れる代表グッズ（任意）</h2>
<input id="main-good" placeholder="例：コレ缶">

<hr>

<h2>⑤ 商品名テンプレート</h2>
<textarea id="template-title" rows="2">{NAME} {GOOD} {COUNT}</textarea>

<h2>⑥ 説明文テンプレート</h2>
<textarea id="template-description" rows="14">
●商品概要
{NAME}　{COUNT}
{GOODS}


●梱包方法
まとめてOPP袋→厚紙補強→水濡れ防止


●商品の状態
開封のみ、未使用品
※素人保管のため気にされる方は購入お控えください






検索用
{SEARCH}
</textarea>

<button onclick="generate()">商品名・説明文を生成</button>

<h2>生成結果</h2>
<div>
  <strong>【商品名】</strong>
  <pre id="result-title"></pre>

  <strong>【商品説明】</strong>
  <pre id="result-desc"></pre>
</div>

<h2>コピー用：商品名</h2>
<textarea id="copy-title" rows="2"></textarea>
<button onclick="copyTitle()">商品名をコピー</button>

<h2>コピー用：商品説明</h2>
<textarea id="copy-desc" rows="14"></textarea>
<button onclick="copyDesc()">商品説明をコピー</button>

<script src="script.js"></script>
</body>
</html>
